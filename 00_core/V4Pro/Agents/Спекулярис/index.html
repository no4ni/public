<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SpecVision – управление лицом</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 20px;
            border-radius: 8px;
            width: 400px;
            z-index: 10;
        }
        textarea {
            width: 100%;
            height: 150px;
            background: #222;
            color: #0f0;
            border: 1px solid #555;
            padding: 8px;
            font-family: monospace;
            resize: vertical;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #4CAF50;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover { background: #45a049; }
        #status {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="controls">
        <h3>SpecVision v0.1</h3>
        <textarea id="jsonInput" placeholder='{"pose":{"head":{"rotation":[0,0,0]}}}'>{
    "version": "0.1",
    "pose": {
        "head": {
            "rotation": [0.0, 0.5, 0.0]
        }
    }
}</textarea>
        <button id="applyBtn">Применить позу</button>
        <div id="status">Готов. Загружаю модель...</div>
    </div>

    <!-- Подключаем Three.js и вспомогательные модули -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);

        // Камера
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 3);
        camera.lookAt(0, 1.5, 0);

        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = false;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(1, 2, 2);
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0x446688, 0.5);
        backLight.position.set(-1, 1, -1);
        scene.add(backLight);

        // Контроллер камеры
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0);
        controls.enableDamping = true;

        // Загрузка модели
        const loader = new GLTFLoader();
        let model, mixer, bonesMap = {};

        loader.load(
            'ЛицоНеГоловаСКостями.glb', // путь к твоему файлу
            (gltf) => {
                model = gltf.scene;
                scene.add(model);

                // Поиск костей
                model.traverse((obj) => {
                    if (obj.isBone) {
                        console.log('Найдена кость:', obj.name);
                        bonesMap[obj.name] = obj;
                    }
                });

                // Если есть анимации, можно создать миксер (пока не нужен)
                if (gltf.animations && gltf.animations.length) {
                    mixer = new THREE.AnimationMixer(model);
                    gltf.animations.forEach((clip) => {
                        mixer.clipAction(clip).play();
                    });
                }

                // Центрируем и масштабируем
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);

                document.getElementById('status').innerText = 'Модель загружена. Кости: ' + Object.keys(bonesMap).join(', ');
            },
            undefined,
            (error) => {
                console.error('Ошибка загрузки модели:', error);
                document.getElementById('status').innerText = 'Ошибка загрузки модели. Проверь консоль.';
            }
        );

        // Функция применения позы из JSON
        function applyPose(jsonString) {
            try {
                const data = JSON.parse(jsonString);
                const pose = data.pose || {};
                
                // Поворот головы
                const headRot = pose.head?.rotation;
                if (headRot && bonesMap['head']) {
                    bonesMap['head'].rotation.set(headRot[0], headRot[1], headRot[2]);
                } else {
                    console.warn('Кость head не найдена или нет rotation');
                }

                // Здесь можно добавить обработку других костей (глаза, брови и т.д.)
                
                document.getElementById('status').innerText = 'Поза применена ✓';
            } catch (e) {
                alert('Ошибка в JSON: ' + e.message);
            }
        }

        // Кнопка
        document.getElementById('applyBtn').addEventListener('click', () => {
            const json = document.getElementById('jsonInput').value;
            applyPose(json);
        });

        // Анимация
        function animate() {
            requestAnimationFrame(animate);

            if (mixer) mixer.update(0.016); // примерно 60fps

            controls.update();

            renderer.render(scene, camera);
        }
        animate();

        // Адаптация под размер окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
