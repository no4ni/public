<!DOCTYPE html>
<html>
<head>
    <title>Симбиозная система</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <h1>Симбиозная система</h1>
    <p>Сервер запущен успешно!</p>
    <p>Текущее время: <span id="time"></span></p>
    
    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
